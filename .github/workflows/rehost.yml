name: rehost-exocad
on: workflow_dispatch
permissions:
  contents: write
jobs:
  rehost:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: download exocad from archive.org
        run: |
          for i in $(seq 1 30); do
            curl -L -C - --retry 10 --retry-all-errors -o exocad.rar "https://archive.org/download/exocad-DentalCAD3.0-2021-03-25/exocad-DentalCAD3.0-2021-03-25.rar"
            sz=$(stat -c%s exocad.rar 2>/dev/null || echo 0)
            echo "attempt $i: $sz"
            [ "$sz" -ge 4556048566 ] && break
            sleep 3
          done
          ls -l exocad.rar
      - name: split
        run: split -b 1800m exocad.rar exo.part_ && ls -lh exo.part_*
      - name: upload to release v3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in exo.part_*; do gh release upload v3 "$f" --repo ${{ github.repository }} --clobber; done
          echo done
